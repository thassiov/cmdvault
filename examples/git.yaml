name: Git
description: Version control and GitHub CLI operations

commands:
  # Branching
  - name: checkout branch
    command: git
    args: ["checkout", "{{branch}}"]
    description: Switch to an existing branch
    placeholders:
      branch:
        source: "git branch -a --format='%(refname:short)'"

  - name: create branch
    command: git
    args: ["checkout", "-b", "{{name}}"]
    description: Create and switch to a new branch

  - name: delete branch
    command: git
    args: ["branch", "-d", "{{branch}}"]
    description: Delete a local branch (must be fully merged)
    placeholders:
      branch:
        source: "git branch --format='%(refname:short)'"

  - name: merge branch
    command: git
    args: ["merge", "--no-ff", "{{branch}}"]
    description: Merge a branch with a merge commit (no fast-forward)
    placeholders:
      branch:
        source: "git branch --format='%(refname:short)'"

  - name: rebase onto
    command: git
    args: ["rebase", "{{branch}}"]
    description: Rebase current branch onto another branch
    placeholders:
      branch:
        source: "git branch -a --format='%(refname:short)'"

  # Staging and committing
  - name: diff staged
    command: git
    args: ["diff", "--staged"]
    description: Show changes staged for the next commit

  - name: commit
    command: git
    args: ["commit", "-m", "{{message}}"]
    description: Create a commit with a message

  - name: amend commit
    command: git
    args: ["commit", "--amend", "--no-edit"]
    description: Add staged changes to the last commit without editing the message

  - name: unstage file
    command: git
    args: ["restore", "--staged", "{{file}}"]
    description: Remove a file from the staging area
    placeholders:
      file:
        source: "git diff --staged --name-only"

  # Stash
  - name: stash save
    command: git
    args: ["stash", "push", "-m", "{{message}}"]
    description: Stash working changes with a description

  - name: stash pop
    command: git
    args: ["stash", "pop", "{{stash}}"]
    description: Apply and remove a stash entry
    placeholders:
      stash:
        source: "git stash list --format='%gd  %gs'"

  - name: stash show
    command: git
    args: ["stash", "show", "-p", "{{stash}}"]
    description: Show the diff of a stash entry
    placeholders:
      stash:
        source: "git stash list --format='%gd  %gs'"

  # History
  - name: log oneline
    command: git
    args: ["log", "--oneline", "--graph", "--decorate", "-20"]
    description: Compact commit graph of the last 20 commits

  - name: log file history
    command: git
    args: ["log", "--follow", "-p", "{{file}}"]
    description: Show full commit history and diffs for a specific file
    placeholders:
      file:
        source: "git ls-files"

  - name: blame
    command: git
    args: ["blame", "{{file}}"]
    description: Show who last modified each line of a file
    placeholders:
      file:
        source: "git ls-files"

  # Tags
  - name: list tags
    command: git
    args: ["tag", "-l", "--sort=-version:refname"]
    description: List all tags sorted by version (newest first)

  - name: create tag
    command: git
    args: ["tag", "-a", "{{tag}}", "-m", "{{message}}"]
    description: Create an annotated tag with a message

  - name: delete tag
    command: git
    args: ["tag", "-d", "{{tag}}"]
    description: Delete a local tag
    placeholders:
      tag:
        source: "git tag -l"

  # Remote
  - name: fetch all
    command: git
    args: ["fetch", "--all", "--prune"]
    description: Fetch all remotes and remove deleted remote-tracking branches

  - name: push force-with-lease
    command: git
    args: ["push", "--force-with-lease"]
    description: Force push safely (fails if remote has new commits)

  # GitHub CLI
  - name: pr list
    command: gh
    args: ["pr", "list"]
    description: List open pull requests in the current repo

  - name: pr checkout
    command: gh
    args: ["pr", "checkout", "{{pr}}"]
    description: Check out a pull request branch locally
    placeholders:
      pr:
        source: "gh pr list --json number,title,headRefName --jq '.[] | \"\\(.number)\\t\\(.headRefName)\\t\\(.title)\"'"

  - name: pr view
    command: gh
    args: ["pr", "view", "{{pr}}", "--web"]
    description: Open a pull request in the browser
    placeholders:
      pr:
        source: "gh pr list --json number,title,headRefName --jq '.[] | \"\\(.number)\\t\\(.headRefName)\\t\\(.title)\"'"

  - name: issue list
    command: gh
    args: ["issue", "list"]
    description: List open issues in the current repo

  - name: issue view
    command: gh
    args: ["issue", "view", "{{issue}}", "--web"]
    description: Open an issue in the browser
    placeholders:
      issue:
        source: "gh issue list --json number,title --jq '.[] | \"\\(.number)\\t\\(.title)\"'"

  - name: run list
    command: gh
    args: ["run", "list", "--limit=10"]
    description: List the 10 most recent workflow runs

  - name: run watch
    command: gh
    args: ["run", "watch", "{{run}}"]
    description: Watch a workflow run in real-time
    placeholders:
      run:
        source: "gh run list --json databaseId,displayTitle,status --jq '.[] | \"\\(.databaseId)\\t\\(.status)\\t\\(.displayTitle)\"'"
