name: Databases
description: Database management for PostgreSQL and SQLite

commands:
  # PostgreSQL
  - name: psql connect
    command: psql
    args: ["-h", "{{host}}", "-U", "{{user}}", "-d", "{{database}}"]
    description: Open an interactive PostgreSQL session

  - name: psql list databases
    command: psql
    args: ["-h", "{{host}}", "-U", "{{user}}", "-l"]
    description: List all databases on a PostgreSQL server

  - name: psql run query
    command: psql
    args: ["-h", "{{host}}", "-U", "{{user}}", "-d", "{{database}}", "-c", "{{query}}"]
    description: Execute a single SQL query against a PostgreSQL database

  - name: psql dump
    command: sh
    args: ["-c", "pg_dump -h {{host}} -U {{user}} {{database}} > {{output}}"]
    description: Dump a PostgreSQL database to a file

  - name: psql table sizes
    command: psql
    args: ["-h", "{{host}}", "-U", "{{user}}", "-d", "{{database}}", "-c", "SELECT relname, pg_size_pretty(pg_total_relation_size(relid)) FROM pg_catalog.pg_statio_user_tables ORDER BY pg_total_relation_size(relid) DESC LIMIT 20;"]
    description: Show the 20 largest tables by total size including indexes

  # SQLite
  - name: sqlite3 open
    command: sqlite3
    args: ["{{file}}"]
    description: Open an interactive SQLite session

  - name: sqlite3 dump
    command: sqlite3
    args: ["{{file}}", ".dump"]
    description: Dump the entire SQLite database as SQL statements

  - name: sqlite3 tables
    command: sqlite3
    args: ["{{file}}", ".tables"]
    description: List all tables in a SQLite database
