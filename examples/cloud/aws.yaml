name: AWS CLI
description: Common AWS operations for EC2, S3, Lambda, RDS, CloudWatch, and CloudFormation

commands:
  - name: ec2 list instances
    command: aws
    args: ["ec2", "describe-instances", "--query", "Reservations[].Instances[].[InstanceId,State.Name,InstanceType,PrivateIpAddress,Tags[?Key==`Name`].Value|[0]]", "--output", "table"]
    description: List all EC2 instances with ID, state, type, IP, and name

  - name: ec2 start instance
    command: aws
    args: ["ec2", "start-instances", "--instance-ids", "{{instance_id}}"]
    description: Start a stopped EC2 instance
    placeholders:
      instance_id:
        source: "aws ec2 describe-instances --query 'Reservations[].Instances[].InstanceId' --output text | tr '\\t' '\\n'"

  - name: ec2 stop instance
    command: aws
    args: ["ec2", "stop-instances", "--instance-ids", "{{instance_id}}"]
    description: Stop a running EC2 instance
    placeholders:
      instance_id:
        source: "aws ec2 describe-instances --query 'Reservations[].Instances[].InstanceId' --output text | tr '\\t' '\\n'"

  - name: ssm session
    command: aws
    args: ["ssm", "start-session", "--target", "{{instance_id}}"]
    description: Start an SSM session to an EC2 instance (no SSH key needed)
    placeholders:
      instance_id:
        source: "aws ec2 describe-instances --query 'Reservations[].Instances[].InstanceId' --output text | tr '\\t' '\\n'"

  - name: s3 list buckets
    command: aws
    args: ["s3", "ls"]
    description: List all S3 buckets

  - name: s3 sync upload
    command: aws
    args: ["s3", "sync", "{{local_path}}", "s3://{{bucket}}"]
    description: Sync a local directory to an S3 bucket

  - name: s3 list bucket
    command: aws
    args: ["s3", "ls", "s3://{{bucket}}", "--human-readable", "--summarize"]
    description: List objects in an S3 bucket with human-readable sizes
    placeholders:
      bucket:
        source: "aws s3api list-buckets --query 'Buckets[].Name' --output text | tr '\\t' '\\n'"

  - name: lambda list
    command: aws
    args: ["lambda", "list-functions", "--query", "Functions[].[FunctionName,Runtime,MemorySize,LastModified]", "--output", "table"]
    description: List all Lambda functions with runtime and memory info

  - name: lambda invoke
    command: aws
    args: ["lambda", "invoke", "--function-name", "{{function_name}}", "--log-type", "Tail", "/dev/stdout"]
    description: Invoke a Lambda function and display the response
    placeholders:
      function_name:
        source: "aws lambda list-functions --query 'Functions[].FunctionName' --output text | tr '\\t' '\\n'"

  - name: rds list instances
    command: aws
    args: ["rds", "describe-db-instances", "--query", "DBInstances[].[DBInstanceIdentifier,DBInstanceStatus,Engine,DBInstanceClass]", "--output", "table"]
    description: List all RDS instances with status, engine, and class

  - name: rds stop instance
    command: aws
    args: ["rds", "stop-db-instance", "--db-instance-identifier", "{{db_instance}}"]
    description: Stop an RDS instance
    placeholders:
      db_instance:
        source: "aws rds describe-db-instances --query 'DBInstances[].DBInstanceIdentifier' --output text | tr '\\t' '\\n'"

  - name: rds start instance
    command: aws
    args: ["rds", "start-db-instance", "--db-instance-identifier", "{{db_instance}}"]
    description: Start a stopped RDS instance
    placeholders:
      db_instance:
        source: "aws rds describe-db-instances --query 'DBInstances[].DBInstanceIdentifier' --output text | tr '\\t' '\\n'"

  - name: cloudwatch tail logs
    command: aws
    args: ["logs", "tail", "{{log_group}}", "--follow", "--since", "1h"]
    description: Tail a CloudWatch log group (last hour, follow new events)
    placeholders:
      log_group:
        source: "aws logs describe-log-groups --query 'logGroups[].logGroupName' --output text | tr '\\t' '\\n'"

  - name: cloudformation list stacks
    command: aws
    args: ["cloudformation", "list-stacks", "--query", "StackSummaries[?StackStatus!=`DELETE_COMPLETE`].[StackName,StackStatus,CreationTime]", "--output", "table"]
    description: List active CloudFormation stacks with status and creation time

  - name: cloudformation describe stack
    command: aws
    args: ["cloudformation", "describe-stacks", "--stack-name", "{{stack_name}}", "--query", "Stacks[0]", "--output", "yaml"]
    description: Show full details of a CloudFormation stack
    placeholders:
      stack_name:
        source: "aws cloudformation list-stacks --query 'StackSummaries[?StackStatus!=`DELETE_COMPLETE`].StackName' --output text | tr '\\t' '\\n'"
