name: HTTP Tools
description: HTTP requests, debugging, and diagnostics with curl, wget, and httpie

commands:
  - name: GET request
    command: bash
    args: ["-c", "curl -s '{{url}}' | jq ."]
    alias: http-get
    description: GET a URL and pretty-print the JSON response

  - name: POST JSON
    command: curl
    args: ["-s", "-X", "POST", "-H", "Content-Type: application/json", "-d", "{{body}}", "{{url}}"]
    alias: http-post
    description: Send a POST request with a JSON body

  - name: response headers
    command: curl
    args: ["-I", "{{url}}"]
    alias: http-head
    description: Fetch only the response headers (HEAD request)

  - name: follow redirects
    command: curl
    args: ["-sL", "{{url}}"]
    description: GET a URL, following any redirects to the final destination

  - name: download file
    command: curl
    args: ["-LO", "{{url}}"]
    alias: http-download
    description: Download a file from a URL, preserving the remote filename

  - name: wget mirror
    command: wget
    args: ["--mirror", "--convert-links", "--no-parent", "{{url}}"]
    description: Mirror a website for offline browsing

  - name: httpie get
    command: http
    args: ["GET", "{{url}}"]
    alias: hget
    description: GET a URL with httpie (colorized output, auto-formatted)

  - name: httpie post
    command: http
    args: ["POST", "{{url}}", "{{body}}"]
    alias: hpost
    description: POST to a URL with httpie (e.g. body as key=value pairs)

  - name: timing breakdown
    command: curl
    args: ["-w", "dns: %{time_namelookup}s\nconnect: %{time_connect}s\ntls: %{time_appconnect}s\nttfb: %{time_starttransfer}s\ntotal: %{time_total}s\n", "-s", "-o", "/dev/null", "{{url}}"]
    alias: http-timing
    description: Show DNS, TCP connect, TLS handshake, TTFB, and total request time

  - name: check ssl cert
    command: bash
    args: ["-c", "curl -vI --stderr - '{{url}}' | grep -A5 'Server certificate'"]
    alias: http-cert
    description: Display the SSL/TLS server certificate details for a URL
