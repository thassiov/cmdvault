name: Wireless Network
description: WiFi management, scanning, and diagnostics with nmcli and iw

commands:
  - name: scan wifi
    command: bash
    args: ["-c", "nmcli device wifi rescan && nmcli device wifi list"]
    description: Rescan and list available WiFi networks with signal strength

  - name: connect wifi
    command: nmcli
    args: ["device", "wifi", "connect", "{{ssid}}", "password", "{{password}}"]
    description: Connect to a WiFi network with SSID and password

  - name: disconnect wifi
    command: nmcli
    args: ["connection", "down", "{{connection}}"]
    description: Disconnect an active network connection
    placeholders:
      connection:
        source: "nmcli -t -f NAME connection show --active"

  - name: list connections
    command: nmcli
    args: ["connection", "show"]
    description: List all saved network connections and their status

  - name: connection details
    command: nmcli
    args: ["connection", "show", "{{connection}}"]
    description: Show full details of a saved network connection
    placeholders:
      connection:
        source: "nmcli -t -f NAME connection show"

  - name: wifi signal strength
    command: nmcli
    args: ["-f", "SSID,SIGNAL,BARS", "device", "wifi", "list"]
    description: List nearby WiFi networks sorted by signal strength

  - name: interface info
    command: iw
    args: ["dev", "{{interface}}", "info"]
    description: Show detailed info for a wireless interface
    placeholders:
      interface:
        source: "iw dev | grep Interface | awk '{print $2}'"

  - name: link quality
    command: iw
    args: ["dev", "{{interface}}", "station", "dump"]
    description: Show connected station info including signal, bitrate, and packets
    placeholders:
      interface:
        source: "iw dev | grep Interface | awk '{print $2}'"
