name: Network Scanning
description: Network discovery, port scanning, and connection monitoring with nmap, ss, and ip

commands:
  - name: quick scan
    command: nmap
    args: ["-sn", "{{target}}"]
    alias: nmap-ping
    description: Ping sweep to discover live hosts on a network (no port scan)

  - name: port scan
    command: nmap
    args: ["-p", "{{port_range}}", "{{host}}"]
    alias: nmap-ports
    description: Scan specific ports on a host (e.g. port_range 22,80,443 or 1-1024)

  - name: service detection
    command: nmap
    args: ["-sV", "{{host}}"]
    alias: nmap-services
    description: Detect service versions on open ports

  - name: os detection
    command: nmap
    args: ["-O", "{{host}}"]
    alias: nmap-os
    description: Detect the operating system of a remote host (requires root)

  - name: aggressive scan
    command: nmap
    args: ["-A", "{{host}}"]
    alias: nmap-full
    description: Full scan with OS detection, version detection, scripts, and traceroute

  - name: vulnerability scan
    command: nmap
    args: ["--script", "vuln", "{{host}}"]
    alias: nmap-vuln
    description: Run NSE vulnerability detection scripts against a host

  - name: top ports
    command: nmap
    args: ["--top-ports", "100", "{{host}}"]
    description: Scan the 100 most common ports on a host

  - name: listening ports
    command: ss
    args: ["-tlnp"]
    alias: ports
    description: Show all listening TCP ports with process names

  - name: listening tcp
    command: bash
    args: ["-c", "ss -tlnp | sort"]
    description: Show listening TCP ports sorted by port number

  - name: listening udp
    command: ss
    args: ["-ulnp"]
    description: Show all listening UDP ports with process names

  - name: all connections
    command: ss
    args: ["-tunap"]
    description: Show all TCP and UDP connections with process info

  - name: ip addresses
    command: ip
    args: ["-br", "addr"]
    description: Show all network interfaces and their IP addresses (brief format)

  - name: routing table
    command: ip
    args: ["route"]
    description: Show the kernel routing table
