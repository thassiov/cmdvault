name: Media Processing
description: Video, audio, and image processing with ffmpeg, yt-dlp, and ImageMagick
commands:
- name: convert video format
  command: ffmpeg
  args:
  - -i
  - '{{input}}'
  - '{{output}}'
  description: 'Convert between video formats. The output format is determined by the file extension. Common formats: .mp4 (H.264), .mkv (Matroska), .webm (VP9), .avi (legacy), .mov (QuickTime). Example: input.mkv -> output.mp4'
  placeholders:
    input:
      type: file
      description: source video file
    output:
      description: output file (extension determines format)
      default: '{{input}}'
- name: scale video 720p
  command: ffmpeg
  args:
  - -i
  - '{{input}}'
  - -vf
  - scale=1280:720
  - -c:a
  - copy
  - '{{output}}'
  description: Downscale video to 720p (1280x720) while copying the audio stream unchanged. Useful for reducing file size when full HD is not needed.
- name: scale video 1080p
  command: ffmpeg
  args:
  - -i
  - '{{input}}'
  - -vf
  - scale=1920:1080
  - -c:a
  - copy
  - '{{output}}'
  description: Scale video to 1080p (1920x1080) while copying the audio stream unchanged. Use -1 in place of width or height to preserve aspect ratio automatically.
- name: extract audio
  command: ffmpeg
  args:
  - -i
  - '{{input}}'
  - -vn
  - -acodec
  - libmp3lame
  - -q:a
  - '2'
  - '{{output}}'
  description: 'Extract audio track from a video and encode as MP3. -vn disables video, -q:a 2 sets VBR quality (~190 kbps). Quality range: 0 (best, ~245 kbps) to 9 (worst, ~65 kbps). Output should be .mp3.'
- name: video to gif
  command: ffmpeg
  args:
  - -i
  - '{{input}}'
  - -vf
  - fps=10,scale=640:-1:flags=lanczos
  - '{{output}}'
  description: Convert video to animated GIF. fps=10 keeps the frame rate manageable, scale=640:-1 scales width to 640px with auto height, and lanczos provides high-quality downscaling. Output should be .gif.
- name: trim video
  command: ffmpeg
  args:
  - -i
  - '{{input}}'
  - -ss
  - '{{start_time}}'
  - -to
  - '{{end_time}}'
  - -c
  - copy
  - '{{output}}'
  description: 'Cut a segment from a video without re-encoding (-c copy). Time format can be HH:MM:SS, SS, or HH:MM:SS.mmm. Example: -ss 00:01:30 -to 00:03:00 extracts from 1m30s to 3m00s.'
- name: compress video
  command: ffmpeg
  args:
  - -i
  - '{{input}}'
  - -vcodec
  - libx264
  - -crf
  - '28'
  - '{{output}}'
  description: 'Compress video using H.264 with CRF (Constant Rate Factor). CRF controls quality vs size: 0 = lossless, 18 = visually lossless, 23 = default, 28 = smaller but noticeable quality loss, 51 = worst quality. Higher CRF means smaller file but lower quality.'
- name: strip metadata
  command: ffmpeg
  args:
  - -i
  - '{{input}}'
  - -map_metadata
  - '-1'
  - -c
  - copy
  - '{{output}}'
  description: Remove all metadata (title, author, GPS, creation date, etc.) from a media file while copying streams unchanged. Useful for privacy before sharing files.
  placeholders:
    input:
      type: file
      description: source media file
    output:
      description: output file path
      default: '{{input}}'
- name: merge audio video
  command: ffmpeg
  args:
  - -i
  - '{{video}}'
  - -i
  - '{{audio}}'
  - -c
  - copy
  - '{{output}}'
  description: Combine separate video and audio files into a single container without re-encoding. Both streams are copied as-is. Make sure the formats are compatible with the output container.
  placeholders:
    video:
      type: file
      description: video file
    audio:
      type: file
      description: audio file
    output:
      description: output file path
      default: '{{video}}'
- name: extract frames
  command: ffmpeg
  args:
  - -i
  - '{{input}}'
  - -vf
  - fps=1
  - frame_%04d.png
  description: Extract frames from a video as PNG images. fps=1 extracts one frame per second. Use fps=0.1 for one frame every 10 seconds, fps=10 for 10 frames per second, or fps=1/60 for one frame per minute. Output files are named frame_0001.png, frame_0002.png, etc.
- name: video info
  command: ffprobe
  args:
  - -v
  - quiet
  - -print_format
  - json
  - -show_format
  - -show_streams
  - '{{input}}'
  description: Display detailed media file information in JSON format including codec, resolution, bitrate, duration, frame rate, and stream metadata. Useful for inspecting files before processing.
  placeholders:
    input:
      type: file
      description: media file to inspect
- name: download video
  command: yt-dlp
  args:
  - '{{url}}'
  description: Download a video using yt-dlp with default settings. Automatically selects the best available format. Supports YouTube, Vimeo, Twitter, and hundreds of other sites.
- name: download best quality
  command: yt-dlp
  args:
  - -f
  - bestvideo+bestaudio
  - '{{url}}'
  description: Download the best available video and audio streams separately and merge them. This may result in a larger file than the default but ensures maximum quality. Requires ffmpeg for merging.
- name: download audio only
  command: yt-dlp
  args:
  - -x
  - --audio-format
  - mp3
  - '{{url}}'
  description: 'Download only the audio track and convert to MP3. -x extracts audio, --audio-format mp3 converts to MP3. Other formats: aac, flac, m4a, opus, vorbis, wav.'
- name: list formats
  command: yt-dlp
  args:
  - -F
  - '{{url}}'
  description: List all available download formats for a URL without downloading. Shows format ID, extension, resolution, codec, and file size. Use the format ID with -f to download a specific format.
- name: download subtitle
  command: yt-dlp
  args:
  - --write-sub
  - --sub-lang
  - en
  - --skip-download
  - '{{url}}'
  description: Download only the English subtitles without the video. Change --sub-lang to download other languages (e.g., pt, es, fr). Use --list-subs to see available subtitle languages.
- name: resize image
  command: convert
  args:
  - '{{input}}'
  - -resize
  - '{{size}}'
  - '{{output}}'
  description: 'Resize an image using ImageMagick. Size syntax: "800x600" (fit within bounds), "800x600!" (force exact dimensions, may distort), "50%" (scale by percentage), "800x" (set width, auto height), "x600" (set height, auto width). Aspect ratio is preserved unless ! is used.'
- name: convert image format
  command: convert
  args:
  - '{{input}}'
  - '{{output}}'
  description: 'Convert between image formats. The output format is determined by the file extension. Supports PNG, JPG, GIF, BMP, TIFF, WebP, SVG, and many more. Example: photo.png -> photo.jpg.'
