name: Tmux
description: Terminal multiplexer session and window management

commands:
  - name: list sessions
    command: tmux
    args: ["list-sessions"]
    description: List all active tmux sessions

  - name: attach session
    command: tmux
    args: ["attach", "-t", "{{session}}"]
    description: Attach to an existing tmux session
    placeholders:
      session:
        source: "tmux list-sessions -F '#S' 2>/dev/null"

  - name: new session
    command: tmux
    args: ["new-session", "-s", "{{name}}"]
    description: Create a new named tmux session

  - name: kill session
    command: tmux
    args: ["kill-session", "-t", "{{session}}"]
    description: Kill a tmux session and all its windows
    placeholders:
      session:
        source: "tmux list-sessions -F '#S' 2>/dev/null"

  - name: switch session
    command: tmux
    args: ["switch-client", "-t", "{{session}}"]
    description: Switch the current client to a different session (from within tmux)
    placeholders:
      session:
        source: "tmux list-sessions -F '#S' 2>/dev/null"

  - name: list windows
    command: tmux
    args: ["list-windows"]
    description: List all windows in the current tmux session
