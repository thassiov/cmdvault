name: Kubernetes
description: Cluster management with kubectl

commands:
  # Context and namespace
  - name: switch context
    command: kubectl
    args: ["config", "use-context", "{{context}}"]
    description: Switch to a different cluster context
    placeholders:
      context:
        source: "kubectl config get-contexts -o name"

  - name: set namespace
    command: kubectl
    args: ["config", "set-context", "--current", "--namespace={{namespace}}"]
    description: Set the default namespace for the current context
    placeholders:
      namespace:
        source: "kubectl get ns --no-headers -o custom-columns=:metadata.name"

  - name: current context
    command: kubectl
    args: ["config", "current-context"]
    description: Show the active cluster context

  # Pods
  - name: pod list
    command: kubectl
    args: ["get", "pods", "-o", "wide"]
    description: List all pods with node placement and IP addresses

  - name: pod logs
    command: kubectl
    args: ["logs", "-f", "--tail=100", "{{pod}}"]
    description: Follow pod logs (last 100 lines)
    placeholders:
      pod:
        source: "kubectl get pods --no-headers -o custom-columns=:metadata.name"

  - name: pod exec
    command: kubectl
    args: ["exec", "-it", "{{pod}}", "--", "sh"]
    description: Open a shell inside a running pod
    placeholders:
      pod:
        source: "kubectl get pods --no-headers -o custom-columns=:metadata.name"

  - name: pod describe
    command: kubectl
    args: ["describe", "pod", "{{pod}}"]
    description: Show detailed pod status, events, and configuration
    placeholders:
      pod:
        source: "kubectl get pods --no-headers -o custom-columns=:metadata.name"

  - name: pod delete
    command: kubectl
    args: ["delete", "pod", "{{pod}}"]
    description: Delete a pod (will be recreated if managed by a controller)
    placeholders:
      pod:
        source: "kubectl get pods --no-headers -o custom-columns=:metadata.name"

  - name: pod port-forward
    command: kubectl
    args: ["port-forward", "{{pod}}", "{{local_port}}:{{remote_port}}"]
    description: Forward a local port to a port on a pod
    placeholders:
      pod:
        source: "kubectl get pods --no-headers -o custom-columns=:metadata.name"

  # Deployments
  - name: deployment list
    command: kubectl
    args: ["get", "deployments", "-o", "wide"]
    description: List all deployments with replica counts and images

  - name: deployment restart
    command: kubectl
    args: ["rollout", "restart", "deployment/{{deployment}}"]
    description: Trigger a rolling restart of a deployment
    placeholders:
      deployment:
        source: "kubectl get deployments --no-headers -o custom-columns=:metadata.name"

  - name: deployment scale
    command: kubectl
    args: ["scale", "deployment/{{deployment}}", "--replicas={{replicas}}"]
    description: Scale a deployment to a specific number of replicas
    placeholders:
      deployment:
        source: "kubectl get deployments --no-headers -o custom-columns=:metadata.name"

  - name: deployment rollout status
    command: kubectl
    args: ["rollout", "status", "deployment/{{deployment}}"]
    description: Watch the rollout progress of a deployment
    placeholders:
      deployment:
        source: "kubectl get deployments --no-headers -o custom-columns=:metadata.name"

  # Services
  - name: service list
    command: kubectl
    args: ["get", "services", "-o", "wide"]
    description: List all services with type, cluster IP, and ports

  - name: service port-forward
    command: kubectl
    args: ["port-forward", "service/{{service}}", "{{local_port}}:{{remote_port}}"]
    description: Forward a local port to a service
    placeholders:
      service:
        source: "kubectl get services --no-headers -o custom-columns=:metadata.name"

  # Cluster overview
  - name: get all
    command: kubectl
    args: ["get", "all"]
    description: List all resources in the current namespace

  - name: top pods
    command: kubectl
    args: ["top", "pods", "--sort-by=cpu"]
    description: Show pod CPU and memory usage sorted by CPU

  - name: top nodes
    command: kubectl
    args: ["top", "nodes"]
    description: Show node CPU and memory usage

  - name: events
    command: kubectl
    args: ["get", "events", "--sort-by=.lastTimestamp"]
    description: List cluster events sorted by time (newest last)
