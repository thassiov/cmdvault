name: SSH
description: SSH connections, key management, and file transfer with ssh, scp, and ssh-keygen

commands:
  # Connections
  - name: ssh connect
    command: ssh
    args: ["{{host}}"]
    description: Connect to a host defined in SSH config
    placeholders:
      host:
        source: "grep '^Host ' ~/.ssh/config 2>/dev/null | awk '{print $2}' | grep -v '*'"

  - name: ssh with key
    command: ssh
    args: ["-i", "{{key}}", "{{user}}@{{host}}"]
    description: Connect to a host using a specific identity key

  # File transfer
  - name: scp upload
    command: scp
    args: ["{{local_file}}", "{{host}}:{{remote_path}}"]
    description: Upload a file to a remote host via SCP
    placeholders:
      host:
        source: "grep '^Host ' ~/.ssh/config 2>/dev/null | awk '{print $2}' | grep -v '*'"

  - name: scp download
    command: scp
    args: ["{{host}}:{{remote_path}}", "{{local_path}}"]
    description: Download a file from a remote host via SCP
    placeholders:
      host:
        source: "grep '^Host ' ~/.ssh/config 2>/dev/null | awk '{print $2}' | grep -v '*'"

  # Key management
  - name: generate ed25519 key
    command: ssh-keygen
    args: ["-t", "ed25519", "-C", "{{comment}}"]
    description: Generate a modern Ed25519 SSH key pair

  - name: generate rsa key
    command: ssh-keygen
    args: ["-t", "rsa", "-b", "4096", "-C", "{{comment}}"]
    description: Generate a 4096-bit RSA SSH key pair

  - name: copy public key
    command: ssh-copy-id
    args: ["{{host}}"]
    description: Install your public key on a remote host for passwordless login
    placeholders:
      host:
        source: "grep '^Host ' ~/.ssh/config 2>/dev/null | awk '{print $2}' | grep -v '*'"

  # Tunneling
  - name: ssh tunnel
    command: ssh
    args: ["-L", "{{local_port}}:localhost:{{remote_port}}", "{{host}}"]
    description: Create a local port forward to a remote host
    placeholders:
      host:
        source: "grep '^Host ' ~/.ssh/config 2>/dev/null | awk '{print $2}' | grep -v '*'"
