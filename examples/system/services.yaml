name: Service Management
description: Systemd service and journal management with systemctl and journalctl

commands:
  # Service control
  - name: service status
    command: systemctl
    args: ["status", "{{service}}"]
    description: Show the status of a running service
    placeholders:
      service:
        source: "systemctl list-units --type=service --state=running --no-legend | awk '{print $1}'"

  - name: service start
    command: systemctl
    args: ["start", "{{service}}"]
    description: Start a service
    placeholders:
      service:
        source: "systemctl list-unit-files --type=service --no-legend | awk '{print $1}'"

  - name: service stop
    command: systemctl
    args: ["stop", "{{service}}"]
    description: Stop a running service
    placeholders:
      service:
        source: "systemctl list-units --type=service --state=running --no-legend | awk '{print $1}'"

  - name: service restart
    command: systemctl
    args: ["restart", "{{service}}"]
    description: Restart a running service
    placeholders:
      service:
        source: "systemctl list-units --type=service --state=running --no-legend | awk '{print $1}'"

  - name: service enable
    command: systemctl
    args: ["enable", "{{service}}"]
    description: Enable a service to start on boot
    placeholders:
      service:
        source: "systemctl list-unit-files --type=service --no-legend | awk '{print $1}'"

  - name: service disable
    command: systemctl
    args: ["disable", "{{service}}"]
    description: Disable a service from starting on boot
    placeholders:
      service:
        source: "systemctl list-units --type=service --state=running --no-legend | awk '{print $1}'"

  # Failed units
  - name: failed units
    command: systemctl
    args: ["list-units", "--state=failed"]
    description: List all failed systemd units

  - name: restart failed
    command: systemctl
    args: ["restart", "{{unit}}"]
    description: Restart a failed unit
    placeholders:
      unit:
        source: "systemctl list-units --state=failed --no-legend | awk '{print $1}'"

  # Timers
  - name: list timers
    command: systemctl
    args: ["list-timers", "--all"]
    description: List all systemd timers with next and last trigger times

  # Journal
  - name: journal follow
    command: journalctl
    args: ["-f"]
    description: Follow the system journal in real time

  - name: journal unit
    command: journalctl
    args: ["-u", "{{unit}}", "--no-pager", "-n", "100"]
    description: Show the last 100 journal entries for a specific unit
    placeholders:
      unit:
        source: "systemctl list-units --type=service --no-legend | awk '{print $1}'"

  - name: journal boot
    command: journalctl
    args: ["-b", "--no-pager", "-p", "err"]
    description: Show all error-level messages from the current boot
