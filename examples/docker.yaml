name: Docker
description: Container, image, volume, and network management

commands:
  # Containers
  - name: list containers
    command: docker
    args: ["ps", "-a", "--format", "table {{.ID}}\t{{.Names}}\t{{.Image}}\t{{.Status}}\t{{.Ports}}"]
    description: List all containers with status and port mappings

  - name: container logs
    command: docker
    args: ["logs", "-f", "--tail=100", "{{container}}"]
    description: Follow container logs (last 100 lines)
    placeholders:
      container:
        source: "docker ps --format '{{.Names}}'"

  - name: container shell
    command: docker
    args: ["exec", "-it", "{{container}}", "sh"]
    description: Open a shell in a running container
    placeholders:
      container:
        source: "docker ps --format '{{.Names}}'"

  - name: container bash
    command: docker
    args: ["exec", "-it", "{{container}}", "bash"]
    description: Open bash in a running container (requires bash installed)
    placeholders:
      container:
        source: "docker ps --format '{{.Names}}'"

  - name: stop container
    command: docker
    args: ["stop", "{{container}}"]
    description: Stop a running container gracefully
    placeholders:
      container:
        source: "docker ps --format '{{.Names}}'"

  - name: restart container
    command: docker
    args: ["restart", "{{container}}"]
    description: Restart a container
    placeholders:
      container:
        source: "docker ps -a --format '{{.Names}}'"

  - name: remove container
    command: docker
    args: ["rm", "{{container}}"]
    description: Remove a stopped container
    placeholders:
      container:
        source: "docker ps -a --format '{{.Names}}'"

  - name: container inspect
    command: docker
    args: ["inspect", "{{container}}"]
    description: Show detailed container configuration and state
    placeholders:
      container:
        source: "docker ps -a --format '{{.Names}}'"

  - name: container stats
    command: docker
    args: ["stats", "--no-stream"]
    description: Show CPU, memory, and network usage for all running containers

  - name: container top
    command: docker
    args: ["top", "{{container}}"]
    description: Show running processes inside a container
    placeholders:
      container:
        source: "docker ps --format '{{.Names}}'"

  # Images
  - name: list images
    command: docker
    args: ["images", "--format", "table {{.Repository}}\t{{.Tag}}\t{{.Size}}\t{{.CreatedSince}}"]
    description: List all local images with size and age

  - name: pull image
    command: docker
    args: ["pull", "{{image}}"]
    description: Pull an image from a registry

  - name: remove image
    command: docker
    args: ["rmi", "{{image}}"]
    description: Remove a local image
    placeholders:
      image:
        source: "docker images --format '{{.Repository}}:{{.Tag}}'"

  - name: image history
    command: docker
    args: ["history", "{{image}}"]
    description: Show the layer history of an image
    placeholders:
      image:
        source: "docker images --format '{{.Repository}}:{{.Tag}}'"

  # Volumes
  - name: list volumes
    command: docker
    args: ["volume", "ls"]
    description: List all Docker volumes

  - name: inspect volume
    command: docker
    args: ["volume", "inspect", "{{volume}}"]
    description: Show volume details and mount point
    placeholders:
      volume:
        source: "docker volume ls --format '{{.Name}}'"

  # Networks
  - name: list networks
    command: docker
    args: ["network", "ls"]
    description: List all Docker networks

  - name: inspect network
    command: docker
    args: ["network", "inspect", "{{network}}"]
    description: Show network configuration and connected containers
    placeholders:
      network:
        source: "docker network ls --format '{{.Name}}'"

  # Cleanup
  - name: prune system
    command: docker
    args: ["system", "prune", "-f"]
    description: Remove unused containers, networks, and dangling images

  - name: prune all
    command: docker
    args: ["system", "prune", "-a", "-f", "--volumes"]
    description: Remove ALL unused data including volumes and all unused images (destructive)
